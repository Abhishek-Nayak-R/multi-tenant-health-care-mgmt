apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-auth-service
  namespace: hms
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: gcr.io/hms-project/auth-service:latest # Example container registry tag
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hms-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: hms-auth-service
  namespace: hms
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-patient-service
  namespace: hms
  labels:
    app: patient-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: gcr.io/hms-project/patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: hms-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: hms-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: hms-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: hms-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hms-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hms-secrets
                  key: JWT_SECRET
            - name: SEARCH_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: hms-config
                  key: SEARCH_SERVICE_HOST
---
apiVersion: v1
kind: Service
metadata:
  name: hms-patient-service
  namespace: hms
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: patient-service
---
