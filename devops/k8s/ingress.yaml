apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hms-ingress
  namespace: hms
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - http:
        paths:
          # Route auth requests
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: hms-auth-service
                port:
                  number: 8081
          
          # Route patient operations
          - path: /patients(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: hms-patient-service
                port:
                  number: 8082
          
          # Route search operations
          - path: /search(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: hms-search-service
                port:
                  number: 8083
