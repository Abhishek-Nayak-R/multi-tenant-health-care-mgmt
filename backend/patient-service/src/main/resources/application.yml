server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hms_db}
    username: ${DB_USER:hms_user}
    password: ${DB_PASSWORD:hms_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Instruct Hibernate to use schema-based multi-tenancy
        multiTenancy: SCHEMA
    hibernate:
      ddl-auto: none
    show-sql: true

jwt:
  secret: hms_super_secret_jwt_key_that_is_at_least_256_bits_long_123456789

services:
  search-service:
    url: http://${SEARCH_SERVICE_HOST:localhost}:8083/search/patients
